# ============================================================
# Bangladesh_SmartGrid_STGT - Conda Environment
# Create with: conda env create -f environment.yml
# ============================================================
name: smartgrid-stgt
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy=1.26.4
  - pandas=2.2.2
  - scipy=1.13.1
  - scikit-learn=1.5.0
  - networkx=3.3
  - matplotlib=3.9.0
  - seaborn=0.13.2
  - jupyterlab=4.2.2
  - tqdm=4.66.4
  - pyyaml=6.0.1
  - pip:
      - torch==2.3.1
      - torchvision==0.18.1
      - torch-geometric==2.5.3
      - shap==0.45.1
      - captum==0.7.0
      - plotly==5.22.0
      - mlflow==2.14.1
      - hydra-core==1.3.2
      - omegaconf==2.3.0
      - rich==13.7.1
      - black==24.4.2
      - ruff==0.4.9
      - pytest==8.2.2
